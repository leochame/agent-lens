listen:
  host: 127.0.0.1
  port: 5290
routing:
  defaultProvider: 中转站
  byHeader: x-target-provider
  byPathPrefix: {}
  autoDetectProviderByFormat: true
  formatProviders:
    anthropic: 中转站
    openai: provider_2
providers:
  中转站:
    baseURL: https://ruoli.dev/v1
    hostHeader: ruoli.dev
    authMode:
      type: inject
      header: x-api-key
      value: sk-K37VK2NWCTPCUMut6JemgfVj4XKITJ74WmvJ4n4knWGz6EtC
    pathRewrite: []
  provider_2:
    baseURL: https://aixj.vip
    authMode:
      type: inject
      header: authorization
      value: sk-1b41e615614e1dbba4a4fb0e8920f71dfd0e8d2205482ff33c0ba4af836f3fa5
      valuePrefix: "Bearer "
    pathRewrite: []
logging:
  filePath: ./logs/requests.jsonl
  archiveRequests: true
  maxArchiveBodyBytes: 0
  redactHeaders:
    - authorization
    - x-api-key
    - cookie
    - set-cookie
requestTimeoutMs: 120000
