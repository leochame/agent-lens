listen:
  host: 127.0.0.1
  port: 5290
routing:
  defaultProvider: openai
  byHeader: x-target-provider
  byPathPrefix: {}
  autoDetectProviderByFormat: true
  formatProviders:
    anthropic: anthropic
    openai: openai
providers:
  openai:
    baseURL: https://openai-relay.example.com/v1
    authMode:
      type: inject
      header: authorization
      value: ${OPENAI_API_KEY:-}
      valuePrefix: "Bearer "
    pathRewrite: []
  anthropic:
    baseURL: https://anthropic-relay.example.com
    authMode:
      type: inject
      header: x-api-key
      value: ${ANTHROPIC_API_KEY:-}
    pathRewrite: []
logging:
  filePath: ./logs/requests.jsonl
  archiveRequests: false
  maxArchiveBodyBytes: 0
  redactHeaders:
    - authorization
    - x-api-key
    - cookie
    - set-cookie
requestTimeoutMs: 120000
