listen:
  host: 127.0.0.1
  port: 5290
routing:
  defaultProvider: 中转站
  byHeader: x-target-provider
  byPathPrefix: {}
  autoDetectProviderByFormat: true
  formatProviders:
    anthropic: 中转站
    openai: provider_2
providers:
  中转站:
    baseURL: https://ruoli.dev/v1
    hostHeader: ruoli.dev
    authMode:
      type: inject
      header: x-api-key
      value: sk-K37VK2NWCTPCUMut6JemgfVj4XKITJ74WmvJ4n4knWGz6EtC
    pathRewrite: []
  provider_2:
    baseURL: https://f.sillydream.top/v1
    authMode:
      type: inject
      header: authorization
      value: sk-Fn3MgyltqyK5GS4sX0eoGIVP3LxUXi8GHizS2OfCiFAKY9Gw
      valuePrefix: "Bearer "
    pathRewrite: []
logging:
  filePath: ./logs/requests.jsonl
  archiveRequests: false
  maxArchiveBodyBytes: 0
  redactHeaders:
    - authorization
    - x-api-key
    - cookie
    - set-cookie
requestTimeoutMs: 120000
