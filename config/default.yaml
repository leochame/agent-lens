listen:
  host: 127.0.0.1
  port: 5290
routing:
  defaultProvider: ruoli.dev - gpt
  routes:
    - pathPrefix: /v1
      provider: ruoli.dev - gpt
      apiFormat: openai
      stripPrefix: true
    - pathPrefix: /claude
      provider: anyrouter
      apiFormat: anthropic
      stripPrefix: true
  byHeader: x-target-provider
  byPathPrefix: {}
  autoDetectProviderByFormat: true
  formatProviders:
    anthropic: anyrouter
    openai: ruoli.dev - gpt
providers:
  sillydream:
    baseURL: https://f.sillydream.top/v1
    authMode:
      type: inject
      header: authorization
      value: sk-PK2SCdu1yxMjPcVdBxtXtJehOnEfUTcKsNyH1X0V8LVh6veZ
      valuePrefix: "Bearer "
    pathRewrite: []
  ruoli.dev - gpt:
    baseURL: https://ruoli.dev/v1
    authMode:
      type: inject
      header: authorization
      value: sk-QhyVfGIvjSVIRC2OhLeg8uMi3DRrHgVjuwdpk2Ya3IkPBS3F
      valuePrefix: "Bearer "
    pathRewrite: []
  anyrouter:
    baseURL: https://anyrouter.top
    authMode:
      type: inject
      header: x-api-key
      value: sk-BmkEVy8HvASu0PYdyedywMGTcOFJBmj8WFAs8kitizlrCDzN
    pathRewrite: []
  windhub:
    baseURL: https://windhub.cc/v1
    authMode:
      type: inject
      header: authorization
      value: sk-nOSugbsMiXfkRq8Li8PLYFywqOFHPHCRk5b1qCpwU1hZFiTI
      valuePrefix: "Bearer "
    pathRewrite: []
logging:
  filePath: ./logs/requests.jsonl
  archiveRequests: false
  maxArchiveBodyBytes: 0
  redactHeaders:
    - authorization
    - x-api-key
    - cookie
    - set-cookie
requestTimeoutMs: 120000000
